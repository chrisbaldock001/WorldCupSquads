<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup 2026 Squad</title>
  <meta name="description" content="FIFA World Cup 2026 squad — players, shirt numbers and photos.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header__eyebrow">FIFA World Cup 2026</div>
    <h1 class="site-header__title" id="hdr-name">Loading…</h1>
    <p class="site-header__subtitle" id="hdr-sub"></p>
  </header>

  <main>
    <a class="back-link" href="index.html">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      All teams
    </a>

    <div class="team-header">
      <img class="team-header__flag" id="hdr-flag" src="" alt="">
      <div class="team-header__info">
        <h2 class="team-header__title" id="hdr-title"></h2>
        <p class="team-header__manager" id="hdr-coach"></p>
        <p class="team-header__manager" id="hdr-group" style="margin-top:.2rem;"></p>
      </div>
    </div>

    <div id="squad-container"></div>
  </main>

  <footer class="site-footer">
    <p>FIFA World Cup 2026 · USA, Canada &amp; Mexico · 48 Teams</p>
  </footer>

  <!-- ── Player detail overlay ────────────────────────────────── -->
  <div id="player-overlay" class="player-overlay" aria-hidden="true">
    <div class="player-overlay__backdrop" id="ov-backdrop"></div>
    <div class="player-overlay__sheet" role="dialog" aria-modal="true" aria-labelledby="ov-name">
      <div class="player-overlay__handle"></div>
      <button class="player-overlay__close" id="ov-close" aria-label="Close player details">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M14 4L4 14M4 4l10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <div class="player-overlay__body">
        <div class="player-overlay__photo-wrap">
          <div class="player-overlay__photo-placeholder" id="ov-placeholder"></div>
          <img class="player-overlay__photo" id="ov-photo" alt="" style="display:none">
          <div class="player-overlay__num-badge" id="ov-num-badge"></div>
        </div>
        <div class="player-overlay__info">
          <div class="player-overlay__meta">
            <span class="player-overlay__pos-badge" id="ov-pos-badge"></span>
            <span class="player-overlay__captain-badge" id="ov-captain-badge" style="display:none">Captain</span>
          </div>
          <h2 class="player-overlay__name" id="ov-name"></h2>
          <p class="player-overlay__club" id="ov-club"></p>
          <div class="player-overlay__stats">
            <div class="player-overlay__stat">
              <span class="player-overlay__stat-val" id="ov-age">—</span>
              <span class="player-overlay__stat-lbl">Age</span>
            </div>
            <div class="player-overlay__stat">
              <span class="player-overlay__stat-val" id="ov-caps">—</span>
              <span class="player-overlay__stat-lbl">Caps</span>
            </div>
            <div class="player-overlay__stat">
              <span class="player-overlay__stat-val" id="ov-pos-val"></span>
              <span class="player-overlay__stat-lbl">Position</span>
            </div>
            <div class="player-overlay__stat">
              <span class="player-overlay__stat-val" id="ov-num-val"></span>
              <span class="player-overlay__stat-lbl">Number</span>
            </div>
          </div>
        </div>
      </div>

      <div class="player-overlay__nav-row">
        <button class="player-overlay__nav-btn" id="ov-prev" aria-label="Previous player">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M13 4l-7 7 7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="player-overlay__counter" id="ov-counter">1 / 26</span>
        <button class="player-overlay__nav-btn" id="ov-next" aria-label="Next player">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M7 4l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="squads.js"></script>
  <script>
    /* ── Helpers ─────────────────────────────────────────────── */

    function initials(name) {
      return name.split(/\s+/).slice(0, 2).map(w => w[0]).join("").toUpperCase();
    }

    async function fetchPlayerData(title) {
      const key = "wc26_" + title;
      const hit = sessionStorage.getItem(key);
      if (hit !== null) {
        try {
          const parsed = JSON.parse(hit);
          if (parsed && typeof parsed === "object" && "image" in parsed) return parsed;
        } catch {}
        return { image: hit || null, born: null, caps: null };
      }
      const result = { image: null, born: null, caps: null };
      try {
        // Fetch image + lead section wikitext (contains the infobox) in one request
        const url = "https://en.wikipedia.org/w/api.php?action=query"
          + "&titles=" + encodeURIComponent(title)
          + "&prop=pageimages|revisions"
          + "&pithumbsize=500"
          + "&rvprop=content&rvslots=main&rvsection=0"
          + "&format=json&origin=*";
        const data = await (await fetch(url)).json();
        const page = Object.values(data.query.pages)[0];
        if (!page || page.missing) { sessionStorage.setItem(key, JSON.stringify(result)); return result; }
        if (page.thumbnail?.source) result.image = page.thumbnail.source;

        // Wikitext is in slots.main["*"] (modern API) or directly in ["*"] (legacy)
        const wikitext = page.revisions?.[0]?.slots?.main?.["*"]
                      || page.revisions?.[0]?.["*"]
                      || "";

        if (wikitext) {
          // Birth date from {{Birth date|YYYY|MM|DD}} — structured, no JS Date parsing needed
          const bdm = wikitext.match(/\{\{[Bb]irth[^}|]*\|(\d{4})\|(\d{1,2})\|(\d{1,2})/);
          if (bdm) result.born = bdm[1] + "-" + bdm[2].padStart(2,"0") + "-" + bdm[3].padStart(2,"0");

          // International caps from infobox: | nationalcaps = 87 (or nationalcaps1, national_caps)
          const capsM = wikitext.match(/\|\s*national_?caps\d*\s*=\s*(\d+)/);
          if (capsM) result.caps = parseInt(capsM[1], 10);
        }

        sessionStorage.setItem(key, JSON.stringify(result));
      } catch {}
      return result;
    }

    /* ── Normalise both squad data formats to position-grouped ── */

    const POS_TO_GROUP = { GK: "Goalkeepers", DEF: "Defenders", MID: "Midfielders", FWD: "Forwards" };
    const GROUP_TO_POS = { Goalkeepers: "GK", Defenders: "DEF", Midfielders: "MID", Forwards: "FWD" };
    const GROUP_ORDER  = ["Goalkeepers", "Defenders", "Midfielders", "Forwards"];
    const POS_FULL     = { GK: "GK", DEF: "DEF", MID: "MID", FWD: "FWD" };

    function normalizePlayers(raw) {
      const first = Object.values(raw)[0];

      if (Array.isArray(first)) {
        // Already grouped — ensure every player has a `position` code
        const out = {};
        for (const [group, arr] of Object.entries(raw)) {
          out[group] = arr.map(p => ({ ...p, position: p.position || GROUP_TO_POS[group] || "GK" }));
        }
        return out;
      }

      // Number-keyed object format: group by position field
      const groups = {};
      Object.values(raw)
        .sort((a, b) => a.number - b.number)
        .forEach(p => {
          const g = POS_TO_GROUP[p.position] || "Other";
          (groups[g] = groups[g] || []).push(p);
        });
      return Object.fromEntries(GROUP_ORDER.filter(k => groups[k]).map(k => [k, groups[k]]));
    }

    /* ── Overlay state ───────────────────────────────────────── */

    let allPlayers  = [];
    let currentIdx  = 0;

    const overlay      = document.getElementById("player-overlay");
    const ovPhoto      = document.getElementById("ov-photo");
    const ovPlaceholder= document.getElementById("ov-placeholder");
    const ovNumBadge   = document.getElementById("ov-num-badge");
    const ovPosBadge   = document.getElementById("ov-pos-badge");
    const ovCaptain    = document.getElementById("ov-captain-badge");
    const ovName       = document.getElementById("ov-name");
    const ovClub       = document.getElementById("ov-club");
    const ovAge        = document.getElementById("ov-age");
    const ovCaps       = document.getElementById("ov-caps");
    const ovPosVal     = document.getElementById("ov-pos-val");
    const ovNumVal     = document.getElementById("ov-num-val");
    const ovCounter    = document.getElementById("ov-counter");

    function calcAge(born) {
      const b = new Date(born);
      if (isNaN(b)) return "—";
      const today = new Date();
      let age = today.getFullYear() - b.getFullYear();
      const m = today.getMonth() - b.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < b.getDate())) age--;
      return age;
    }

    function renderOverlay(player) {
      // Photo
      ovPlaceholder.textContent = initials(player.name);
      ovPlaceholder.style.display = "flex";
      ovPhoto.style.display = "none";
      ovPhoto.src = "";

      function showOvImg(src) {
        ovPhoto.src = src;
        ovPhoto.style.display = "block";
        ovPlaceholder.style.display = "none";
        ovPhoto.onerror = () => { ovPhoto.style.display = "none"; ovPlaceholder.style.display = "flex"; };
      }
      if (player.image) {
        showOvImg(player.image);
      } else if (player.wiki) {
        fetchPlayerData(player.wiki).then(data => {
          if (data.image) showOvImg(data.image);
          if (!player._fetched) {
            player._fetched = true;
            if (data.born)  player.born = data.born;
            if (data.caps != null) player.caps = data.caps;
          }
          if (allPlayers[currentIdx] === player) {
            ovAge.textContent  = player.born ? calcAge(player.born) : "—";
            ovCaps.textContent = (player.caps != null) ? player.caps : "—";
          }
        });
      }

      // Number
      ovNumBadge.textContent = player.number;
      ovNumVal.textContent   = player.number;

      // Position badge
      const pos = player.position || "";
      ovPosBadge.className   = "player-overlay__pos-badge player-overlay__pos-badge--" + pos;
      ovPosBadge.textContent = POS_FULL[pos] || pos || "—";

      // Captain
      ovCaptain.style.display = player.captain ? "inline-flex" : "none";

      // Name & club
      ovName.textContent = player.fullName || player.name;
      ovClub.textContent = player.club || "";

      // Stats
      ovAge.textContent  = player.born ? calcAge(player.born) : "—";
      ovCaps.textContent = (player.caps != null) ? player.caps : "—";
      ovPosVal.textContent = POS_FULL[pos] || pos || "—";

      // Counter
      ovCounter.textContent = `${currentIdx + 1} / ${allPlayers.length}`;
    }

    function openOverlay(idx) {
      currentIdx = idx;
      renderOverlay(allPlayers[currentIdx]);
      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeOverlay() {
      overlay.classList.remove("is-open");
      overlay.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function navigate(dir) {
      currentIdx = (currentIdx + dir + allPlayers.length) % allPlayers.length;
      renderOverlay(allPlayers[currentIdx]);
    }

    document.getElementById("ov-close").addEventListener("click", closeOverlay);
    document.getElementById("ov-backdrop").addEventListener("click", closeOverlay);
    document.getElementById("ov-prev").addEventListener("click", () => navigate(-1));
    document.getElementById("ov-next").addEventListener("click", () => navigate(1));

    document.addEventListener("keydown", e => {
      if (!overlay.classList.contains("is-open")) return;
      if (e.key === "Escape")      closeOverlay();
      if (e.key === "ArrowLeft")   navigate(-1);
      if (e.key === "ArrowRight")  navigate(1);
    });

    // Swipe support
    let touchX = 0;
    overlay.addEventListener("touchstart", e => { touchX = e.touches[0].clientX; }, { passive: true });
    overlay.addEventListener("touchend",   e => {
      const dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) > 48) navigate(dx < 0 ? 1 : -1);
    }, { passive: true });

    /* ── Build player card ───────────────────────────────────── */

    function buildCard(player, idx) {
      const abbr = initials(player.name);
      const card = document.createElement("div");
      card.className = "player-card";
      card.setAttribute("role", "button");
      card.setAttribute("tabindex", "0");
      card.setAttribute("aria-label", `View ${player.fullName || player.name} details`);

      card.innerHTML = `
        <div class="player-card__photo-wrap">
          <div class="player-card__photo-placeholder" aria-hidden="true">${abbr}</div>
          <img class="player-card__photo" alt="${player.fullName || player.name}" loading="lazy" style="display:none;">
          <span class="player-card__number">${player.number}</span>
        </div>
        <span class="player-card__name">${player.name}</span>
        <span class="player-card__club">${player.club || ""}</span>
      `;

      const img = card.querySelector("img");
      const ph  = card.querySelector(".player-card__photo-placeholder");

      function showImg(src) {
        img.src = src;
        img.style.display = "block";
        ph.style.display  = "none";
        img.onerror = () => { img.style.display = "none"; ph.style.display = "flex"; };
      }

      if (player.image) {
        showImg(player.image);
      } else if (player.wiki) {
        fetchPlayerData(player.wiki).then(data => {
          if (data.image) showImg(data.image);
          if (!player._fetched) {
            player._fetched = true;
            if (data.born)  player.born = data.born;
            if (data.caps != null) player.caps = data.caps;
          }
        });
      }

      card.addEventListener("click", () => openOverlay(idx));
      card.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openOverlay(idx); }
      });

      return card;
    }

    /* ── Render squad ────────────────────────────────────────── */

    const teamKey = new URLSearchParams(window.location.search).get("team") || "";
    const team    = SQUADS[teamKey];

    if (!team) {
      document.getElementById("hdr-name").textContent = "Team not found";
    } else {
      document.title = team.name + " — FIFA World Cup 2026 Squad";

      document.getElementById("hdr-name").textContent  = team.name;
      document.getElementById("hdr-flag").src          = `https://flagcdn.com/w80/${team.flag}.png`;
      document.getElementById("hdr-flag").alt          = team.name + " flag";
      document.getElementById("hdr-title").textContent = team.name;

      const subEl = document.getElementById("hdr-sub");
      if (team.coach) subEl.innerHTML = `Coach: <strong style="color:#FF5F4E;">${team.coach}</strong>`;
      if (team.group) {
        subEl.innerHTML += `&nbsp;·&nbsp; Group ${team.group}`;
        document.getElementById("hdr-group").textContent = `Group ${team.group} — ${team.groupTeams}`;
      }

      const container  = document.getElementById("squad-container");
      const hasPlayers = team.players && Object.keys(team.players).length > 0;

      if (!hasPlayers) {
        const msg = document.createElement("p");
        msg.style.cssText = "color:rgba(255,255,255,.45);margin-top:2rem;font-size:.95rem;";
        msg.textContent = "Squad data coming soon.";
        container.appendChild(msg);
      } else {
        const normalized = normalizePlayers(team.players);

        Object.entries(normalized).forEach(([label, players]) => {
          const section = document.createElement("section");
          section.className = "position-group";

          const h = document.createElement("h3");
          h.className = "position-group__title";
          h.textContent = label;
          section.appendChild(h);

          const grid = document.createElement("div");
          grid.className = "players-grid";

          players.forEach(p => {
            const idx = allPlayers.length;
            allPlayers.push(p);
            grid.appendChild(buildCard(p, idx));
          });

          section.appendChild(grid);
          container.appendChild(section);
        });
      }
    }
  </script>

</body>
</html>
