name: Update WC26 Player Stats

on:
  schedule:
    - cron: '0 9 * * *'   # 9am UTC daily
  workflow_dispatch:       # manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and write player stats
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/update-wc26-stats.js

      - name: Commit updated stats if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wc26-stats.js
          git diff --staged --quiet || git commit -m "chore: update WC26 player stats [$(date -u '+%Y-%m-%d')]"
          git push
